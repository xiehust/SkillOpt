# skilleval — optimize a user skill against a rubric-judged task set.
# Small-budget demo defaults: exec target (Claude Code) + chat judge/optimizer.
_base_: ../_base_/default.yaml

model:
  target_backend: claude_code_exec
  target: claude-opus-4-8
  optimizer_backend: openai_chat
  optimizer: openai.gpt-5.5
  reasoning_effort: medium

train:
  num_epochs: 2
  train_size: 0          # derive from split
  batch_size: 4
  accumulation: 1

gradient:
  minibatch_size: 4
  merge_batch_size: 4
  analyst_workers: 4

optimizer:
  learning_rate: 4
  # short demo run: skip epoch-level extras to keep the model-call budget small
  use_slow_update: false
  use_meta_skill: false

evaluation:
  use_gate: true
  sel_env_num: 0     # full val split
  test_env_num: 0    # full test split
  eval_test: true

env:
  name: skilleval
  skill_init: data/skilleval_demo/report_skill/initial.md
  split_mode: split_dir
  split_dir: data/skilleval_demo/report_tasks
  workers: 3
  timeout: 900
  limit: 0
